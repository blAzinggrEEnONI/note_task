name: notetask_pro
description: "NoteTask Pro - Notes & Task Manager"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Code generation helpers
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Routing
  go_router: ^14.6.1

  # Database
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.4+4
  path: ^1.9.0
  path_provider: ^2.1.4

  # Rich text editor
  flutter_quill: ^11.5.0

  # Audio recording & playback
  record: ^6.0.0
  audioplayers: ^6.1.0

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # File picking & permissions
  file_picker: ^8.1.7
  permission_handler: ^11.3.1

  # Utilities
  uuid: ^4.5.1
  intl: any
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
